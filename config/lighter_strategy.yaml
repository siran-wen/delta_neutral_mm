# Lighter LPP strategy runtime config (SKHYNIXUSD).
#
# Loaded by ``scripts/run_lighter_strategy.py``. CLI flags
# (``--market`` / ``--duration`` / ``--output-dir``) override the
# ``strategy`` block below where they overlap; everything else (the
# planner knobs, recovery thresholds, tracker hookup) comes from
# this file.
#
# Phase 3: multi-market LPP. This file targets SKHYNIXUSD; sibling
# files ``lighter_strategy_samsung.yaml`` and
# ``lighter_strategy_hyundai.yaml`` use the same knobs against
# SAMSUNGUSD and HYUNDAIUSD. Size $50 across all sessions, hedge
# disabled — see "Phase 3 prep" decision notes for context.
#
# LPP weekly pool figures live separately in ``config/lpp_pool.yaml``;
# this file stays scoped to per-run tuning so the pool numbers can
# move on a different cadence.

strategy:
  # Default market — overridable by --market on the CLI.
  market: SKHYNIXUSD
  # Lighter on-chain id. Verify via:
  #   python scripts/observe_lighter.py --probe-rwa
  market_index: 161
  price_decimals: 3
  size_decimals: 3

  # Inventory management (Phase 3: size $50, multi-market spread,
  # ~$2k account). target_max_delta_usdc = skew clamp denominator;
  # at this notional the skew has reached its full
  # ``skew_max_offset_bp`` push. hard_position_cap_usdc = absolute
  # cap. hard_position_cap_pct = pct-of-collateral double cap;
  # effective cap is min(absolute, pct*collateral). Three markets
  # at 10% each cap total exposure to 30% of net worth.
  target_max_delta_usdc: "50"
  hard_position_cap_usdc: "100"
  hard_position_cap_pct: "0.10"
  skew_max_offset_bp: "5"

  # Market-state guards. min_market_spread_bp pinned to 0 since the
  # 4-30 verify run found the previous "3" floor was knocking out
  # legitimate quote ticks during low-vol windows.
  min_market_spread_bp: "0"
  max_market_spread_bp: "100"

  # Share-warn (15h SKHYNIX data justified 0.95 over 0.8 — see
  # ``strategy/lpp_quoter.py`` defaults docstring).
  share_warn_threshold: "0.95"
  share_warn_widen_bp: "5"

  # Reprice control. Phase 3: 8bp (was 12bp under Phase 2.1) — size
  # $50 means each reprice churns far less notional, so the tighter
  # drift band is back to keeping spread fresh without burning fees.
  reprice_drift_bp: "8"
  reprice_min_interval_sec: "60"

  # Tick / snapshot cadence. Phase 3 multi-market: tick stretched
  # 1s → 10s, collateral refresh halved, OM REST sync halved. Three
  # processes sharing one IP otherwise tripped Lighter's WAF rate
  # limit (~100 req/5min observed); these settings keep the combined
  # REST budget below the threshold. Side effect: reprice latency
  # is 1-9s instead of <1s — accepted because size $50 doesn't need
  # sub-second responsiveness.
  tick_interval_sec: "10"
  snapshot_interval_sec: "60"
  # Phase 2.1: how often to refresh collateral via REST. Used by the
  # pct-cap path and the daily-drawdown gate.
  collateral_refresh_interval_sec: "120"
  # OrderManager periodic REST sync of open_orders / positions. The
  # default in ``execution.lighter.lighter_order_manager`` is 30s; we
  # widen to 60s for the same WAF-budget reason. WS still pushes order
  # state in real time so the slower REST poll only delays the safety
  # net, not the primary update path.
  om_periodic_sync_interval_sec: 60

  # diff_quotes tolerance — same as paper trading defaults
  price_tolerance_bp: "0.5"
  size_tolerance_pct: "0.05"

  # Emergency stop
  emergency_stop_on_consecutive_reject_count: 5
  emergency_stop_on_ws_disconnect_sec: 300
  # Triggers when the cancel path silently fails N times in a row —
  # protects against the regression that produced a -1.132 SKHYNIXUSD
  # short on the first live test (cancels would no-op while new orders
  # accumulated). On trip, the quoter calls om.cancel_all + a REST
  # backup cancel via the gateway and breaks out of the run loop.
  emergency_stop_on_consecutive_cancel_fail_count: 3

  # Phase 2.1 P2.1.2: active hedge (IOC reduce_only).
  # Phase 3: DISABLED. Size $50 doesn't accumulate enough exposure to
  # need active hedging, and the 5-1 P2.2 live run showed the IOC fix
  # is still flaky (5 consecutive ``OrderExpiry`` rejects → emergency
  # stop). Config kept for later re-enable; threshold values frozen
  # at P2.1 levels so re-enabling is a one-line ``enabled: true`` flip.
  active_hedge_enabled: false
  active_hedge_trigger_pct: "0.7"
  active_hedge_target_pct: "0.3"
  active_hedge_taker_fee_max_pct: "0.1"
  active_hedge_pause_after_sec: 30
  active_hedge_max_consecutive_fails: 5

  # Phase 2.1 P2.1.3: daily max drawdown stop loss.
  # Effective threshold = min(daily_max_drawdown_usdc,
  # daily_max_drawdown_pct * collateral_start). When current collateral
  # has fallen by that much, cancel everything and break the run loop.
  daily_max_drawdown_usdc: "100"
  daily_max_drawdown_pct: "0.05"
  daily_drawdown_check_interval_sec: 300

  # Session-level overrides for default_size_usdc.
  # Phase 3: flat $50 across all 7 KR sessions — multi-market
  # diversification replaces session-level size variation. The
  # KR_OVERNIGHT / KR_WEEKEND lower-size carve-out is no longer
  # needed because the absolute size is already small enough that
  # thin-liquidity slippage doesn't bite as hard.
  session_overrides:
    KR_MARKET_HOURS_AM:
      default_size_usdc: "50"
    KR_MARKET_HOURS_PM:
      default_size_usdc: "50"
    KR_LUNCH_BREAK:
      default_size_usdc: "50"
    KR_AFTER_CLOSE:
      default_size_usdc: "50"
    KR_OVERNIGHT:
      default_size_usdc: "50"
    KR_BEFORE_OPEN:
      default_size_usdc: "50"
    KR_WEEKEND:
      default_size_usdc: "50"

recovery:
  # Cancel any orders found resting on the account at startup.
  cancel_stale_orders: true
  # Soft-warn threshold (forensics only — both paths still inject
  # into the OM in Phase 1.2+).
  warn_if_existing_position_above_usdc: "50"
  # Hard-abort threshold:
  #   "0"  (default)  → abort on ANY non-zero residual. Phase 1.2 P0.2
  #                     enforces a clean account between runs to break
  #                     the dirty-state link that produced the 4-30
  #                     catastrophic short.
  #   ">0"            → abort only if notional ≥ threshold (dev/testing
  #                     mode that exercises the OM inject path).
  #   "-1"            → never abort (explicit opt-out).
  abort_if_existing_position_above_usdc: "0"
  # How long to wait after sending stale-order cancels before
  # starting the quoter — gives ws confirmations time to drain.
  wait_after_cancel_sec: 5

logging:
  # Console verbosity (overridden by -v / -vv on the CLI).
  level: INFO
  # JSONL file pattern relative to --output-dir. ``{date}`` is
  # interpolated to UTC YYYYMMDD at startup. Phase 3: per-market
  # filename so concurrent SKHYNIX/SAMSUNG/HYUNDAI runs don't
  # clobber each other's logs in a shared output dir.
  jsonl_filename: "strategy_skhynix_{date}.jsonl"

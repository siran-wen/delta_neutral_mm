# ====================================
# Hyperliquid 交易所配置文件 (v10)
# ====================================
# 阶段 3 配置：Bootstrap 自动建仓 + 双腿对冲做市
# 前置：阶段 1（单腿）和阶段 2（双腿手动建仓）已跑通
# 目标：清空账户后用 --bootstrap-inventory 自动建仓，验证 Bootstrap 模块

hyperliquid:
  # ── API 连接 ──────────────────────────────────────────────────
  api:
    base_url: https://api.hyperliquid.xyz
    timeout: 30
    version: v1
    ws_url: wss://api.hyperliquid.xyz/ws

  # ── 认证（必填，替换为你的真实凭证） ──────────────────────────
  authentication:
    private_key: '0x_YOUR_PRIVATE_KEY_HERE'         # 🔑 必填
    wallet_address: '0x_YOUR_WALLET_ADDRESS_HERE'   # 📍 必填

  # ── 交易对配置 ────────────────────────────────────────────────
  # hedger.enabled=true 时做市品种从 trading_pairs 提取，
  # 此处的 symbols 仅作为 Hyperliquid 连接时的元数据参考
  symbols:
    perpetual:
      - SOL/USDC:USDC
    spot:
      - SOL/USDC                  # CCXT spot 口径（原生 USOL，CCXT 剥 U 前缀）

  # ── 精度配置 ──────────────────────────────────────────────────
  precision:
    price:
      SOL/USDC:USDC: 4
      SOL/USDC: 3
      default: 6
    quantity:
      SOL/USDC:USDC: 3
      SOL/USDC: 3
      default: 6

  # ── 手续费（参考信息，当前不参与 PnL 计算） ───────────────────
  fees:
    perpetual:
      maker: 0.0002
      taker: 0.0005
      funding: 0.0001
    spot:
      maker: 0.0004
      taker: 0.0007

  # ── 交易约束 ──────────────────────────────────────────────────
  trading:
    perpetual:
      default_leverage: 1
      margin_mode: cross
      max_leverage: 50
      max_order_size: 10000
      min_order_size: 0.001
    spot:
      default_leverage: 1
      margin_mode: cash
      max_leverage: 1
      max_order_size: 10000
      min_order_size: 0.001

  # ── 行情轮询 ──────────────────────────────────────────────────
  market_data:
    orderbook_limit: 100
    ticker_interval: 1500     # 1.5 秒轮询（降低 429 限流风险）
    trade_history_limit: 500

  # ── 速率限制 ──────────────────────────────────────────────────
  rate_limits:
    order_creation: 20
    order_cancellation: 50
    rest_api: 100
    websocket: 10

  # ── 健康检查 ──────────────────────────────────────────────────
  health_check:
    enabled: true
    interval: 60
    timeout: 10

  # ── 日志 ──────────────────────────────────────────────────────
  logging:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    level: INFO

  # ── 错误处理 ──────────────────────────────────────────────────
  error_handling:
    max_retries: 3
    retry_delay: 1
    retry_backoff: 2

  # ── 启用 ──────────────────────────────────────────────────────
  enabled: true
  exchange_id: hyperliquid
  name: Hyperliquid

  # ── 开发/调试 ──────────────────────────────────────────────────
  development:
    debug: false
    mock_data: false
    sandbox: false

# ====================================
# 风控配置
# ====================================
risk:
  position_limit:
    max_delta_per_symbol: 1.0    # 单品种最大 |Delta|
    max_delta_global: 10.0       # 全局最大 |Delta|（所有品种之和）
    warn_threshold_pct: 0.8      # 预警阈值（占上限的百分比）
    auto_hedge: true             # 超限时是否自动触发 Hedger
  fat_finger:
    max_deviation_pct: 0.05      # 挂单价偏离中价的最大百分比（5%）
    max_deviation_abs: null      # 偏离绝对值上限（null = 不启用）
    check_market_orders: false   # 是否检查市价单
  kill_switch:
    flatten_positions: true      # 关停时是否平掉全部持仓
    cancel_timeout: 10.0         # 撤单超时（秒）
    flatten_timeout: 30.0        # 平仓超时（秒）

# ====================================
# 连接监控配置
# ====================================
reconnect:
  max_retries: 0                 # 最大重连次数（0 = 无限重试）
  initial_delay: 1.0             # 首次重试延迟（秒）
  max_delay: 60.0                # 最大退避延迟（秒）
  backoff_factor: 2.0            # 指数退避倍率
  heartbeat_interval: 5.0        # 心跳检测间隔（秒）
  heartbeat_timeout: 10.0        # 单次心跳超时（秒）
  cancel_on_disconnect: true     # 断连时是否立即撤单

# ====================================
# 订单管理配置
# ====================================
order_manager:
  reconcile_interval: 3.0        # 对账巡检间隔（秒）
  stale_timeout: 5.0             # 订单变为 STALE 的超时（秒）
  rate_limit_per_sec: 20         # 每秒最大 API 请求数
  rtt_warn_threshold: 2.0        # RTT 预警阈值（秒）

# ====================================
# 对冲配置
# ====================================
hedger:
  enabled: false              # 阶段 1 临时关闭
  hedge_slippage: 0.002       # 对冲限价单滑点（0.2%）

# ====================================
# 做市/对冲交易对配置
# ====================================
# hedger.enabled=true 时，做市品种从此处提取
trading_pairs:
  - base: SOL
    market_symbol: SOL/USDC           # 做市腿（现货，CCXT 口径，底层是 USOL）
    hedge_symbol: SOL/USDC:USDC       # 对冲腿（永续）

# ====================================
# Bootstrap 自动建仓配置
# ====================================
# multiplier=2.0（默认 3.0 在 order_size_usd=10 时建仓仅 20 USDC）
bootstrap:
  enabled: false                       # 默认关闭，靠 CLI 标志显式触发
  base_inventory_multiplier: 2.0       # 底仓数量 = order_size_usd × multiplier / mid
  min_spot_usdc_buffer: 30.0           # Spot 至少保留这么多 USDC 用于挂 bid
  min_perp_usdc_buffer: 20.0           # Perp 至少保留这么多保证金
  skip_if_existing_pct: 0.5            # 已有底仓 ≥ 目标 × 0.5 时跳过建仓
  ioc_slippage: 0.005                  # 模拟市价的激进限价滑点（0.5%）
  max_attempts: 3                      # 单次下单失败重试次数
  verify_net_delta_tolerance: 0.05     # 建仓后净 Delta 容差

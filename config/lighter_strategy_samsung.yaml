# Lighter LPP strategy runtime config (SAMSUNGUSD).
#
# Phase 3 multi-market sibling of ``lighter_strategy.yaml`` (SKHYNIX).
# Same risk/reprice/session knobs — only ``market`` and the per-run
# log filename diverge.
#
# market_index intentionally omitted: ``run_lighter_strategy.py``
# falls back to ``gateway.get_market_index(symbol)`` when the yaml
# field is absent or 0, which keeps this file resilient to Lighter
# renumbering markets.
#
# price_decimals / size_decimals are kept explicit despite the
# preference to auto-fetch: the live-mode entry point currently
# DOES NOT auto-fetch these from the gateway (defaults to 4 if
# absent — wrong for Korean RWAs which all run at 3). Verified via
# ``order_book_details``: SAMSUNGUSD = price_decimals=3,
# size_decimals=3 as of 2026-05-01.

strategy:
  market: SAMSUNGUSD
  price_decimals: 3
  size_decimals: 3

  # Phase 3 Day-1 retune: SAMSUNG L1 depth ~$2,174 makes share scale
  # poorly (8.6% on SKHYNIX vs 2.3% on SAMSUNG at the same $50 size).
  # Lagrangian solve says deploy minimum size ($30) here and steer
  # capital toward SKHYNIX/HYUNDAI. Cap tightened in lockstep —
  # absolute $60, pct 5% (= 0.05 * $2,213 = $111, so absolute is the
  # binding constraint). Tighter pct caps SAMSUNG drift if the
  # account ever runs low on collateral.
  target_max_delta_usdc: "100"
  hard_position_cap_usdc: "500"
  hard_position_cap_pct: "0.25"
  skew_max_offset_bp: "5"

  min_market_spread_bp: "0"
  max_market_spread_bp: "500"

  share_warn_threshold: "0.95"
  share_warn_widen_bp: "5"

  reprice_drift_bp: "8"
  reprice_min_interval_sec: "60"

  # BBO tracking — see SKHYNIX yaml for rationale.
  bbo_track_mode: "passive"
  bbo_track_max_distance_bp: 5

  # Phase 3 multi-market REST budget — see SKHYNIX yaml for rationale.
  tick_interval_sec: "10"
  snapshot_interval_sec: "60"
  collateral_refresh_interval_sec: "120"
  om_periodic_sync_interval_sec: 60

  price_tolerance_bp: "0.5"
  size_tolerance_pct: "0.05"

  emergency_stop_on_consecutive_reject_count: 5
  emergency_stop_on_ws_disconnect_sec: 1800
  emergency_stop_on_consecutive_cancel_fail_count: 3

  # P9 (5-4) SAMSUNG retune: asymmetric BBO quoting. P7 post_only
  # close added a separate 120s wait + cancel-anti-leg machinery; on
  # Day-4 a $396 SAMSUNG long sat single-sided for 2h (anti leg
  # cancelled, lost reward). P9 keeps both legs live: when abs(inv)
  # breaches trigger_pct * effective_cap, plan_quotes prices the
  # close leg aggressively at the BBO and widens the anti leg to
  # asymmetric_anti_distance_bp from mid. No timeout, no fail
  # counter, no disable state — the inventory drifts back as
  # natural takers hit the close leg, and user-driven manual close
  # handles rare large residuals.
  #
  # Day-7 Part 2 SAMSUNG-only retune (trigger 0.7 → 0.5): forensics
  # on the 4.78h all-account session showed SAMSUNG was the dominant
  # source of drag ($8.23/h account-wide; SAMSUNG 92% asymmetric
  # active, max |inv| = $557 against the $500 hard_cap). Crucially,
  # the inv ramped from 0 → -$400 in the first 14 minutes, but the
  # P9/P10 trigger sat at 0.7 × $500 = $350 — by the time asymmetric
  # mode engaged, inv was already deep into adverse-selection
  # territory on the SAMSUNG book (5/4 observer: 26.6% of session
  # had spread<1bp and median 25bp depth was only $4,578). Dropping
  # to 0.5 (= $250 at the current $500 cap) lets the close leg get
  # aggressive earlier in the ramp before |inv| punches the cap, so
  # the anti leg widens to asymmetric_anti_distance_bp and the close
  # gets priority queue treatment while the position is still
  # recoverable. SKHYNIX/HYUNDAI stay at 0.7 — they didn't show the
  # same ramp pathology in the Day-7 trace; HYUNDAI may follow
  # SAMSUNG after a 1–2 day SAMSUNG-only validation window.
  asymmetric_quote_enabled: true
  asymmetric_quote_trigger_pct: "0.5"
  asymmetric_close_mode: "improve_bbo"
  asymmetric_anti_distance_bp: "30"
  # P10 (5-5): scale close size from default at trigger up to cap when
  # inv touches the cap. Day-5 SAMSUNG specifically motivated this —
  # the $100 close was too slow against -$349 inv and inv oscillated
  # -$249 ↔ -$308. With cap=$400 and trigger=$280, midway inv ($340)
  # now closes at ~$250 and at-cap closes at full $400. Anti stays at
  # default. See the SKHYNIX yaml for the full rationale.
  asymmetric_close_size_scaling: "linear"

  daily_max_drawdown_usdc: "100"
  daily_max_drawdown_pct: "0.05"
  daily_drawdown_check_interval_sec: 300

  # 5-5 retune: per-session sizing from Day-5 forensics.
  # Notable shifts:
  #   KR_MARKET_HOURS_PM 200 -> 50: large MM entered the PM book and
  #     squeezed our share — drop size, ride existing quotes instead.
  #   KR_MARKET_HOURS_AM 150 -> 200: AM share still has room.
  #   KR_LUNCH_BREAK 100 -> 50: thin book, dial down notional.
  #   KR_BEFORE_OPEN 100 -> 150 / KR_WEEKEND 100 -> 150: bumped on
  #     observed reward density during these windows.
  #   KR_PRE_OPEN_WITHDRAW activated at 200: 5-5 session_aware patch
  #     flipped the calendar from action="withdraw" to "quote" for
  #     this window after Day-5 found MM activity. Now actually
  #     quotes through plan_quotes.
  session_overrides:
    KR_MARKET_HOURS_AM:
      default_size_usdc: "200"
    KR_MARKET_HOURS_PM:
      default_size_usdc: "150"
    KR_LUNCH_BREAK:
      default_size_usdc: "100"
    KR_AFTER_CLOSE:
      default_size_usdc: "200"
    KR_OVERNIGHT:
      default_size_usdc: "100"
    KR_BEFORE_OPEN:
      default_size_usdc: "100"
    KR_PRE_OPEN_WITHDRAW:
      default_size_usdc: "200"
    KR_WEEKEND:
      default_size_usdc: "150"

recovery:
  cancel_stale_orders: true
  warn_if_existing_position_above_usdc: "100"
  abort_if_existing_position_above_usdc: "0"
  wait_after_cancel_sec: 5

logging:
  level: INFO
  jsonl_filename: "strategy_samsung_{date}.jsonl"

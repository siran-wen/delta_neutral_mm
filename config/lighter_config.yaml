# Lighter exchange configuration.
#
# Env-var placeholders are expanded at load time. Export these shell
# variables before running the observer:
#
#     export LIGHTER_API_PRIVATE_KEY=0x...
#     export LIGHTER_ACCOUNT_INDEX=12345
#     export LIGHTER_API_KEY_INDEX=0

lighter:
  # Mainnet by default. Set to true and override the URLs below for testnet.
  testnet: false
  api_url: https://mainnet.zklighter.elliot.ai
  ws_url: wss://mainnet.zklighter.elliot.ai/stream

  auth:
    # 40-byte hex string registered with Lighter; never commit this file
    # with the literal key in place.
    api_key_private_key: ${LIGHTER_API_PRIVATE_KEY}
    # Your Lighter account_index (integer). Required for account queries;
    # leave ${LIGHTER_ACCOUNT_INDEX} unset or pass --no-account to skip.
    account_index: ${LIGHTER_ACCOUNT_INDEX}
    # API key slot (integer, usually 0). Leave ${LIGHTER_API_KEY_INDEX}
    # unset to default to 0.
    api_key_index: ${LIGHTER_API_KEY_INDEX}

observe:
  # How often to emit a full [OBSERVE] snapshot line (seconds).
  snapshot_interval_s: 60
  # How often to print a BBO summary line (seconds).
  log_book_state_every_s: 1
  # Where to write JSONL files. Created on first run.
  output_dir: logs/lighter_observe

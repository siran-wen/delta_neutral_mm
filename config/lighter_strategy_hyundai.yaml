# Lighter LPP strategy runtime config (HYUNDAIUSD).
#
# Phase 3 multi-market sibling of ``lighter_strategy.yaml`` (SKHYNIX).
# Same risk/reprice/session knobs — only ``market`` and the per-run
# log filename diverge.
#
# market_index intentionally omitted: ``run_lighter_strategy.py``
# falls back to ``gateway.get_market_index(symbol)`` when the yaml
# field is absent or 0, which keeps this file resilient to Lighter
# renumbering markets.
#
# price_decimals / size_decimals are kept explicit despite the
# preference to auto-fetch: the live-mode entry point currently
# DOES NOT auto-fetch these from the gateway (defaults to 4 if
# absent — wrong for Korean RWAs which all run at 3). Verified via
# ``order_book_details``: HYUNDAIUSD = price_decimals=3,
# size_decimals=3 as of 2026-05-01.

strategy:
  market: HYUNDAIUSD
  price_decimals: 3
  size_decimals: 3

  # Phase 3 Day-1 retune: HYUNDAI is the highest-marginal market —
  # thinnest L1 depth (~$270 vs SAMSUNG's $2,174), so a marginal $100
  # of size lifts share more here than anywhere else. $150 per side
  # projects to ~36% share against the $1,752/day pool; cap moved to
  # $300 (= 2x size) to leave the defensive cap check headroom.
  # pct cap loosened to 15% so the absolute cap binds first
  # (0.15 * $2,213 = $332, just above the $300 absolute).
  target_max_delta_usdc: "200"
  hard_position_cap_usdc: "400"
  hard_position_cap_pct: "0.15"
  skew_max_offset_bp: "5"

  # HYUNDAI weekend / overnight spreads observed at 200-450 bp.
  # The default 100 bp guard knocks out every reprice tick during
  # those windows, so we widen to 300 bp for HYUNDAI specifically.
  # SKHYNIX/SAMSUNG keep the tighter 100 bp guard since they trade
  # more steadily.
  min_market_spread_bp: "0"
  max_market_spread_bp: "500"

  share_warn_threshold: "0.95"
  share_warn_widen_bp: "5"

  reprice_drift_bp: "8"
  reprice_min_interval_sec: "60"

  # BBO tracking — see SKHYNIX yaml for rationale.
  bbo_track_mode: "passive"
  bbo_track_max_distance_bp: 5

  # Phase 3 multi-market REST budget — see SKHYNIX yaml for rationale.
  tick_interval_sec: "10"
  snapshot_interval_sec: "60"
  collateral_refresh_interval_sec: "120"
  om_periodic_sync_interval_sec: 60

  price_tolerance_bp: "0.5"
  size_tolerance_pct: "0.05"

  emergency_stop_on_consecutive_reject_count: 5
  emergency_stop_on_ws_disconnect_sec: 300
  emergency_stop_on_consecutive_cancel_fail_count: 3

  # P7 (5-4) retune: post_only LIMIT close (NOT IOC) — aligned with
  # the SAMSUNG yaml so the Day-3 self-trade-protection fix applies
  # uniformly across markets when re-enabled. See lpp_quoter
  # _maybe_trigger_active_hedge docstring for the full Day-3 SAMSUNG
  # regression context. taker_fee_max_pct 0.30 → 0.50 (P7 needs more
  # headroom for the mass-dump skip than IOC-through did);
  # post_submit_wait 5 → 120 (post_only waits for natural taker).
  active_hedge_enabled: false
  active_hedge_trigger_pct: "0.7"
  active_hedge_target_pct: "0.0"
  active_hedge_taker_fee_max_pct: "0.50"
  active_hedge_pause_after_sec: 60
  active_hedge_max_consecutive_fails: 3
  active_hedge_post_submit_wait_sec: 120

  daily_max_drawdown_usdc: "100"
  daily_max_drawdown_pct: "0.05"
  daily_drawdown_check_interval_sec: 300

  # Day-1 retune: max-size deployment across all KR sessions.
  session_overrides:
    KR_MARKET_HOURS_AM:
      default_size_usdc: "100"
    KR_MARKET_HOURS_PM:
      default_size_usdc: "100"
    KR_LUNCH_BREAK:
      default_size_usdc: "75"
    KR_AFTER_CLOSE:
      default_size_usdc: "75"
    KR_OVERNIGHT:
      default_size_usdc: "200"
    KR_BEFORE_OPEN:
      default_size_usdc: "100"
    KR_WEEKEND:
      default_size_usdc: "200"

recovery:
  cancel_stale_orders: true
  warn_if_existing_position_above_usdc: "50"
  abort_if_existing_position_above_usdc: "0"
  wait_after_cancel_sec: 5

logging:
  level: INFO
  jsonl_filename: "strategy_hyundai_{date}.jsonl"
